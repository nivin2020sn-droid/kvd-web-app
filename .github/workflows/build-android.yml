name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Standalone APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Free up disk space
        run: |
          echo "=== Disk BEFORE cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android/sdk/ndk || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/local/share/chromium || true
          sudo rm -rf /usr/local/lib/node_modules || true
          sudo rm -rf /opt/az || true
          sudo rm -rf /opt/microsoft || true
          sudo rm -rf /opt/google/chrome || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"/Ruby || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"/PyPy || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"/go || true
          sudo docker system prune -af --volumes || true
          sudo apt-get clean
          echo "=== Disk AFTER cleanup ==="
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect frontend directory
        id: detect
        shell: bash
        run: |
          if [ -f "frontend/package.json" ]; then DIR="frontend"; \
          elif [ -f "package.json" ]; then DIR="."; \
          else echo "::error::package.json not found"; exit 1; fi
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "Frontend directory: $DIR"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ${{ steps.detect.outputs.dir }}
        run: |
          if [ -f "yarn.lock" ]; then
            corepack enable || true
            yarn install --frozen-lockfile --prefer-offline
          elif [ -f "package-lock.json" ]; then
            npm ci --prefer-offline --no-audit
          else
            npm install --no-audit
          fi

      - name: Expo prebuild (android)
        working-directory: ${{ steps.detect.outputs.dir }}
        env:
          EXPO_NO_TELEMETRY: 1
          CI: 1
        run: npx expo prebuild --platform android --clean --no-install

      - name: Make gradlew executable
        working-directory: ${{ steps.detect.outputs.dir }}/android
        run: chmod +x ./gradlew

      - name: Disk check before gradle
        run: df -h /

      - name: Build Release APK (standalone, debug-signed)
        working-directory: ${{ steps.detect.outputs.dir }}/android
        env:
          GRADLE_OPTS: "-Xmx3g -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx3g"
        run: |
          ./gradlew assembleRelease --no-daemon --console=plain \
            -PenableProguardInReleaseBuilds=false \
            -PenableShrinkResourcesInReleaseBuilds=false \
            -Pandroid.enableR8.fullMode=false

      - name: Disk check after gradle
        if: always()
        run: df -h /

      - name: Remove gradle cache to save space
        if: always()
        run: |
          rm -rf ~/.gradle/caches/transforms-* || true
          rm -rf ~/.gradle/caches/build-cache-* || true
          rm -rf ${{ steps.detect.outputs.dir }}/android/.gradle || true
          rm -rf ${{ steps.detect.outputs.dir }}/android/app/build/intermediates || true
          rm -rf ${{ steps.detect.outputs.dir }}/android/app/build/tmp || true

      - name: List built APK
        working-directory: ${{ steps.detect.outputs.dir }}
        run: |
          ls -la android/app/build/outputs/apk/release/ || true
          du -h android/app/build/outputs/apk/release/*.apk 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cleaning-app-${{ github.sha }}
          path: ${{ steps.detect.outputs.dir }}/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Build summary
        if: always()
        run: |
          echo "### Build Ergebnis :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          APK_PATH=$(find ${{ steps.detect.outputs.dir }}/android/app/build/outputs/apk/release -name '*.apk' 2>/dev/null | head -1)
          if [ -n "$APK_PATH" ]; then
            APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "✅ **Standalone APK erfolgreich gebaut**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Artifact: \`cleaning-app-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- Größe: **$APK_SIZE**" >> $GITHUB_STEP_SUMMARY
            echo "- Mit Debug-Keystore signiert (kein Metro nötig)" >> $GITHUB_STEP_SUMMARY
            echo "- JS-Bundle in der APK enthalten — funktioniert offline" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Build fehlgeschlagen**" >> $GITHUB_STEP_SUMMARY
          fi
