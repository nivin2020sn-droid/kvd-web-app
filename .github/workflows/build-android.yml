name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug + Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect frontend directory
        id: detect
        shell: bash
        run: |
          if [ -f "frontend/package.json" ]; then
            DIR="frontend"
          elif [ -f "package.json" ]; then
            DIR="."
          else
            echo "::error::Could not find package.json"
            ls -la
            exit 1
          fi
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "Frontend directory: $DIR"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ${{ steps.detect.outputs.dir }}
        run: |
          if [ -f "yarn.lock" ]; then
            corepack enable || true
            yarn install --frozen-lockfile
          elif [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Show app.json
        working-directory: ${{ steps.detect.outputs.dir }}
        run: cat app.json || cat app.config.js || true

      - name: Expo prebuild (generate native android project)
        working-directory: ${{ steps.detect.outputs.dir }}
        env:
          EXPO_NO_TELEMETRY: 1
          CI: 1
        run: npx expo prebuild --platform android --clean --no-install

      - name: Make gradlew executable
        working-directory: ${{ steps.detect.outputs.dir }}/android
        run: chmod +x ./gradlew

      - name: Build Debug APK
        working-directory: ${{ steps.detect.outputs.dir }}/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        working-directory: ${{ steps.detect.outputs.dir }}/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: List built APKs
        if: always()
        working-directory: ${{ steps.detect.outputs.dir }}
        run: |
          echo "--- DEBUG ---"
          ls -la android/app/build/outputs/apk/debug/ || true
          echo "--- RELEASE ---"
          ls -la android/app/build/outputs/apk/release/ || true

      - name: Upload Debug APK
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: cleaning-app-debug-${{ github.sha }}
          path: ${{ steps.detect.outputs.dir }}/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Release APK
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: cleaning-app-release-${{ github.sha }}
          path: ${{ steps.detect.outputs.dir }}/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "### Build Ergebnis :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Frontend dir: \`${{ steps.detect.outputs.dir }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Variante | Datei |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Debug APK   | \`cleaning-app-debug-${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Release APK | \`cleaning-app-release-${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Beide APKs sind unter **Artifacts** verfügbar (mit Debug-Keystore signiert)." >> $GITHUB_STEP_SUMMARY
