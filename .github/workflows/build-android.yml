name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug + Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Expo prebuild (generate native android project)
        env:
          EXPO_NO_TELEMETRY: 1
        run: npx expo prebuild --platform android --clean --no-install

      - name: Generate release keystore
        working-directory: frontend/android/app
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias release-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass cleaningapp \
            -keypass cleaningapp \
            -dname "CN=Cleaning App, OU=Mobile, O=Reinigung, L=Berlin, S=Berlin, C=DE"

      - name: Inject release signing config
        working-directory: frontend/android
        run: |
          cat >> gradle.properties <<EOF

          MYAPP_RELEASE_STORE_FILE=release.keystore
          MYAPP_RELEASE_KEY_ALIAS=release-key
          MYAPP_RELEASE_STORE_PASSWORD=cleaningapp
          MYAPP_RELEASE_KEY_PASSWORD=cleaningapp
          EOF

          # Patch app/build.gradle to add signingConfig for release
          python3 <<'PYEOF'
          import re, pathlib
          p = pathlib.Path("app/build.gradle")
          src = p.read_text()

          if "MYAPP_RELEASE_STORE_FILE" in src:
              raise SystemExit(0)

          signing_block = """
              release {
                  if (project.hasProperty('MYAPP_RELEASE_STORE_FILE')) {
                      storeFile file(MYAPP_RELEASE_STORE_FILE)
                      storePassword MYAPP_RELEASE_STORE_PASSWORD
                      keyAlias MYAPP_RELEASE_KEY_ALIAS
                      keyPassword MYAPP_RELEASE_KEY_PASSWORD
                  }
              }
          """

          # Insert signing config inside signingConfigs { ... }
          src = re.sub(
              r"(signingConfigs\s*\{)",
              r"\1" + signing_block,
              src,
              count=1,
          )

          # Make release buildType use signingConfigs.release
          src = re.sub(
              r"(buildTypes\s*\{[^}]*?release\s*\{)([^}]*?signingConfig\s+signingConfigs\.)debug",
              r"\1\2release",
              src,
              count=1,
              flags=re.DOTALL,
          )

          p.write_text(src)
          print("Patched app/build.gradle for release signing.")
          PYEOF

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x ./gradlew

      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        working-directory: frontend/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Locate APKs
        id: apks
        working-directory: frontend
        run: |
          DEBUG_APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          RELEASE_APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "debug_apk=$DEBUG_APK" >> "$GITHUB_OUTPUT"
          echo "release_apk=$RELEASE_APK" >> "$GITHUB_OUTPUT"
          echo "Debug APK: $DEBUG_APK"
          echo "Release APK: $RELEASE_APK"
          ls -la android/app/build/outputs/apk/debug/ || true
          ls -la android/app/build/outputs/apk/release/ || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cleaning-app-debug-${{ github.sha }}
          path: frontend/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: cleaning-app-release-${{ github.sha }}
          path: frontend/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Build summary
        if: always()
        run: |
          echo "### Build Ergebnis :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Variante | Datei |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Debug APK   | \`cleaning-app-debug-${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Release APK | \`cleaning-app-release-${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Beide APKs sind unter **Artifacts** dieses Workflow-Runs verfügbar." >> $GITHUB_STEP_SUMMARY
